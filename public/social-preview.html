<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1280, initial-scale=1" />
    <title>Crowd Symphony Social Preview</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 1280px;
        height: 640px;
        margin: 0;
        overflow: hidden;
        background: #0a0b0d;
        color: #fff;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        position: relative;
        display: grid;
        width: 1280px;
        height: 640px;
        grid-template-columns: 530px 750px;
        background:
          radial-gradient(
            circle at 88% 10%,
            rgb(54 211 153 / 18%),
            transparent 30%
          ),
          radial-gradient(
            circle at 12% 88%,
            rgb(236 72 153 / 14%),
            transparent 28%
          ),
          #0a0b0d;
      }

      .intro {
        position: relative;
        z-index: 2;
        padding: 74px 24px 60px 72px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: #9ff3cd;
        font-size: 18px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #3bd694;
        box-shadow: 0 0 22px #3bd694;
      }

      h1 {
        margin: 22px 0 18px;
        font-size: 62px;
        font-weight: 850;
        letter-spacing: 0;
        line-height: 0.98;
      }

      .description {
        max-width: 440px;
        color: #d0d4d8;
        font-size: 24px;
        line-height: 1.35;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 34px;
      }

      .chip {
        padding: 9px 13px;
        border: 1px solid #3a3f46;
        border-radius: 7px;
        background: #15181c;
        color: #f4f5f6;
        font-size: 16px;
        font-weight: 700;
      }

      .repository {
        position: absolute;
        bottom: 54px;
        left: 72px;
        color: #8d959e;
        font-size: 17px;
        font-weight: 650;
      }

      .product {
        position: relative;
        overflow: hidden;
      }

      .screen {
        position: absolute;
        top: 56px;
        left: 25px;
        width: 810px;
        height: 528px;
        overflow: hidden;
        border: 1px solid #333940;
        border-radius: 14px;
        background: #121417;
        box-shadow: -26px 28px 70px rgb(0 0 0 / 58%);
        transform: perspective(1400px) rotateY(-7deg);
        transform-origin: left center;
      }

      iframe {
        width: 1280px;
        height: 720px;
        border: 0;
        pointer-events: none;
        transform: scale(0.65);
        transform-origin: left top;
      }

      .gesture {
        position: absolute;
        top: 28px;
        right: 34px;
        display: grid;
        width: 102px;
        height: 102px;
        place-items: center;
        border: 10px solid #0a0b0d;
        border-radius: 50%;
        background: #3bd694;
        box-shadow: 0 12px 35px rgb(59 214 148 / 35%);
        color: #08110d;
        font-size: 52px;
        font-weight: 900;
      }

      .label {
        position: absolute;
        right: 58px;
        bottom: 23px;
        z-index: 4;
        padding: 10px 14px;
        border-radius: 6px;
        background: #f3f4f6;
        color: #111318;
        font-size: 16px;
        font-weight: 850;
      }

      .accent {
        position: absolute;
        right: 0;
        bottom: 0;
        width: 590px;
        height: 9px;
        background: linear-gradient(90deg, #3bd694, #f5c451, #ec4899);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="intro">
        <div class="eyebrow">
          <span class="dot"></span>
          YC Stack Auth Hackathon Winner
        </div>
        <h1>Crowd<br />Symphony</h1>
        <div class="description">
          Control a live audience's music with your hands. Real-time,
          synchronized, and built for the room.
        </div>
        <div class="chips">
          <span class="chip">Next.js</span>
          <span class="chip">MediaPipe</span>
          <span class="chip">Socket.IO</span>
          <span class="chip">Web Audio API</span>
        </div>
        <div class="repository">taranggoyal70 / crowd-symphony</div>
      </section>
      <section class="product">
        <div class="screen">
          <iframe src="/conductor" title="Crowd Symphony conductor UI"></iframe>
        </div>
        <div class="gesture">✋</div>
        <div class="label">REAL-TIME MULTI-DEVICE EXPERIENCE</div>
        <div class="accent"></div>
      </section>
    </main>
  </body>
</html>
